# ──────────────────────────────────────────────────────────────────────────────
#  pre-commit configuration — Bash + TypeScript project
#
#  Install pre-commit:  pip install pre-commit
#  Install hooks once:  pre-commit install
#  Run manually:        pre-commit run --all-files
#  Update hooks:        pre-commit autoupdate
# ──────────────────────────────────────────────────────────────────────────────

repos:

  # ── Universal hygiene ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Shell (Bash) ──────────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ["--external-sources", "-e", "SC2015"]

  # ── TypeScript / JavaScript ───────────────────────────────────────────────────
  # Requires: npm install -D eslint prettier @typescript-eslint/parser
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.7.0
    hooks:
      - id: eslint
        files: \.(ts|tsx|js|jsx|mjs)$
        args: ["--fix", "--max-warnings=0"]
        additional_dependencies:
          - eslint@9.7.0
          - "@typescript-eslint/parser@7.13.0"
          - "@typescript-eslint/eslint-plugin@7.13.0"
          - eslint-plugin-import@2.29.1
          - eslint-plugin-unicorn@54.0.0
          - eslint-plugin-sonarjs@1.0.4

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, javascript, jsx, json, yaml, markdown]

  # ── Secret scanning ───────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
