name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './cli'
          severity: warning

  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, azure, gcp]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: cd cli/terraform/${{ matrix.cloud }} && terraform init -backend=false && terraform validate

  gcp-policy-and-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate GCP catalog presets
        run: bash cli/scripts/validate-gcp-catalog.sh
      - name: Check GCP IAM and firewall policy
        run: bash cli/scripts/check-gcp-policy.sh

  website-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci && npm run build
