apiVersion: v1
kind: Secret
metadata:
  name: hermes-agent-secrets
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENROUTER_API_KEY: {{ .Values.env.OPENROUTER_API_KEY | quote }}
  OPENAI_API_KEY: {{ .Values.env.OPENAI_API_KEY | quote }}
  ANTHROPIC_API_KEY: {{ .Values.env.ANTHROPIC_API_KEY | quote }}
  GEMINI_API_KEY: {{ .Values.env.GEMINI_API_KEY | quote }}
