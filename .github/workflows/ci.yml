name: Lint
on: [push, pull_request]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          find ./cli -name '*.sh' -o -name 'hermes-deploy' -o -name 'install.sh' | \
            xargs shellcheck --external-sources
